name: Build Linux

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.2"
          host: "linux"
          target: "desktop"
          arch: "gcc_64"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++

      - name: Configure and build with script
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Package Linux artifact
        run: |
          mkdir -p package-linux
          cp build-linux/DERDesigner package-linux/
          tar -czf DERDesigner-linux.tar.gz -C package-linux .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: DERDesigner-linux
          path: DERDesigner-linux.tar.gz
          if-no-files-found: error
