name: Build Linux

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libgl1-mesa-dev libglib2.0-dev \
            libfuse2 patchelf

      - name: Install Qt via aqt (mirror estavel)
        run: |
          pip install aqtinstall
          python -m aqt install-qt linux desktop 6.9.3 linux_gcc_64 \
            --base https://ftp.fau.de/qtproject \
            --outputdir $HOME/Qt

      - name: Set Qt environment
        run: |
          echo "$HOME/Qt/6.9.3/linux_gcc_64/bin" >> $GITHUB_PATH
          echo "Qt6_DIR=$HOME/Qt/6.9.3/linux_gcc_64/lib/cmake/Qt6" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=$HOME/Qt/6.9.3/linux_gcc_64" >> $GITHUB_ENV

      - name: Configure and build with script
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Download linuxdeploy and Qt plugin
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Package AppImage
        env:
          QMAKE: /home/runner/Qt/6.9.3/linux_gcc_64/bin/qmake
          LD_LIBRARY_PATH: /home/runner/Qt/6.9.3/linux_gcc_64/lib
        run: |
          mkdir -p AppDir/usr/bin
          cp build-linux/DERDesigner AppDir/usr/bin/

          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --output appimage \
            --executable AppDir/usr/bin/DERDesigner

          mv DERDesigner*.AppImage DERDesigner-linux.AppImage

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: DERDesigner-linux
          path: DERDesigner-linux.AppImage
          if-no-files-found: error