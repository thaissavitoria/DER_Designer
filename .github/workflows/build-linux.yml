name: Build Linux

on:
  workflow_call:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.9.3'

    - name: Configure CMake
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Install linuxdeploy
      run: |
        sudo apt-get install -y libfuse2
        wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
        chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

    - name: Package AppImage
      env:
        QMAKE: ${{ env.QT_ROOT_DIR }}/bin/qmake
      run: |
        mkdir -p AppDir/usr/bin
        cp build/DERDesigner AppDir/usr/bin/

        mkdir -p AppDir/usr/share/applications
        cat > AppDir/usr/share/applications/DERDesigner.desktop << 'EOF'
        [Desktop Entry]
        Name=DER Designer
        Exec=DERDesigner
        Icon=DERDesigner
        Type=Application
        Categories=Education;
        EOF

        mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
        cp src/view/icons/app_icon.png AppDir/usr/share/icons/hicolor/256x256/apps/DERDesigner.png

        ./linuxdeploy-x86_64.AppImage --appdir AppDir --plugin qt --output appimage
        mv DER*.AppImage DERDesigner-linux.AppImage

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DERDesigner-linux
        path: DERDesigner-linux.AppImage