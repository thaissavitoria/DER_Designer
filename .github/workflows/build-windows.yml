name: Windows Build

on:
  push:
    branches: ["refactor-solid"]
  pull_request:
    branches: ["refactor-solid"]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.9.3'
        host: windows
        target: desktop
        arch: win64_msvc2022_64

    - name: Configure CMake
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Deploy Qt dependencies
      run: |
        mkdir package
        copy build\Release\DERDesigner.exe package\
        windeployqt --release package\DERDesigner.exe

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DERDesigner-windows
        path: package\