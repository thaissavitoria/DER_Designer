name: Build Windows

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt via aqt (mirror estavel)
        shell: pwsh
        run: |
          pip install aqtinstall
          python -m aqt install-qt windows desktop 6.9.3 win64_msvc2022_64 `
            --base https://ftp.fau.de/qtproject `
            --outputdir D:\Qt

      - name: Set Qt environment
        shell: pwsh
        run: |
          echo "D:\Qt\6.9.3\msvc2022_64\bin" >> $env:GITHUB_PATH
          echo "Qt6_DIR=D:\Qt\6.9.3\msvc2022_64\lib\cmake\Qt6" >> $env:GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=D:\Qt\6.9.3\msvc2022_64" >> $env:GITHUB_ENV

      - name: Configure and build with script
        shell: cmd
        run: build.bat

      - name: Deploy Qt dependencies
        shell: pwsh
        run: |
          $exePath = "build/Release/DERDesigner.exe"
          if (!(Test-Path $exePath)) {
            throw "Executavel nao encontrado em $exePath"
          }

          $windeployqt = (Get-Command windeployqt -ErrorAction Stop).Source
          & $windeployqt --release --compiler-runtime $exePath

      - name: Package Windows artifact
        shell: pwsh
        run: |
          $releaseDir = "build/Release"
          $packageDir = "package-windows"

          New-Item -ItemType Directory -Path $packageDir -Force | Out-Null
          Copy-Item "$releaseDir/DERDesigner.exe" "$packageDir/" -Force

          Get-ChildItem $releaseDir -Filter "*.dll" | ForEach-Object {
            Copy-Item $_.FullName "$packageDir/" -Force
          }

          foreach ($dir in @("platforms", "styles", "imageformats", "iconengines", "translations")) {
            if (Test-Path "$releaseDir/$dir") {
              Copy-Item "$releaseDir/$dir" "$packageDir/$dir" -Recurse -Force
            }
          }

          Compress-Archive -Path "$packageDir/*" -DestinationPath "DERDesigner-windows.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: DERDesigner-windows
          path: DERDesigner-windows.zip
          if-no-files-found: error